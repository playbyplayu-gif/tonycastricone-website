<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Social Reel — Tony Castricone</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@300;400;500;600;700&family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; --purple: #b4a0ff; --purple-deep: #7c5ce0; --gold: #ffd666; --bg: #0a0514; --bg2: #0d0820; --text: #fff; --text-dim: rgba(255,255,255,0.5); --text-faint: rgba(255,255,255,0.25); --card-bg: rgba(255,255,255,0.03); --card-border: rgba(180,160,255,0.08); }
body { background: var(--bg); color: var(--text); font-family: 'Cormorant Garamond', Georgia, serif; overflow-x: hidden; -webkit-font-smoothing: antialiased; line-height: 1.6; }
::selection { background: rgba(180,160,255,0.3); }
::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: rgba(180,160,255,0.15); border-radius: 3px; }
a { color: inherit; text-decoration: none; }

@keyframes fadeUp { from { opacity:0; transform:translateY(30px); } to { opacity:1; transform:translateY(0); } }

/* PAGE HEADER */
.page-header { padding: 5.5rem clamp(1rem,4vw,3rem) 1.5rem; position: relative; overflow: hidden; }
.page-header::before { content: ''; position: absolute; inset: 0; background: url('images/viral-ucla.jpg') center 35% / cover no-repeat; opacity: 0.1; filter: grayscale(25%); }
.page-header::after { content: ''; position: absolute; inset: 0; background: linear-gradient(180deg, rgba(10,5,20,0.7), rgba(10,5,20,0.4), rgba(10,5,20,0.9)); }
.page-header > * { position: relative; z-index: 1; }
.page-header-inner { max-width: 1200px; margin: 0 auto; }
.page-label { font-family: 'Oswald', sans-serif; font-size: 0.68rem; letter-spacing: 0.35em; text-transform: uppercase; color: var(--purple); margin-bottom: 0.5rem; }
.page-title { font-family: 'Oswald', sans-serif; font-weight: 700; font-size: clamp(1.8rem, 4vw, 2.8rem); text-transform: uppercase; line-height: 1; }
.page-rule { width: 45px; height: 3px; background: linear-gradient(90deg, var(--purple), var(--gold)); margin-top: 0.7rem; border-radius: 2px; }
.page-subtitle { font-family: 'Helvetica Neue', Arial, sans-serif; font-size: 0.85rem; color: var(--text-dim); margin-top: 0.6rem; max-width: 600px; }

/* TOP 5 GRID — explicit 3-column placement */
.viral-top5 { max-width: 1200px; margin: 0 auto; padding: 1.2rem clamp(1rem,4vw,3rem) 0.5rem; display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 1rem; align-items: start; }
.viral-top5-col { display: flex; flex-direction: column; gap: 1rem; }
@media (max-width: 700px) { .viral-top5 { grid-template-columns: 1fr; } }

/* REMAINING POSTS MASONRY */
.viral-grid { max-width: 1200px; margin: 0 auto; padding: 1rem clamp(1rem,4vw,3rem) 2rem; columns: 300px 3; column-gap: 1rem; }
.viral-grid .tweet-wrap { break-inside: avoid; margin-bottom: 1rem; }
@media (max-width: 500px) { .viral-grid { columns: 1; } }

/* OTHERS GRID */
.viral-others { max-width: 1200px; margin: 0 auto; padding: 0 clamp(1rem,4vw,3rem) 2rem; columns: 300px 3; column-gap: 1rem; }
.viral-others .tweet-wrap { break-inside: avoid; margin-bottom: 1rem; }
@media (max-width: 500px) { .viral-others { columns: 1; } }

/* Override Twitter embed backgrounds for dark theme */
.twitter-tweet { margin: 0 !important; }

/* MY POSTS GRID (small set) */
.viral-mine { max-width: 1200px; margin: 0 auto; padding: 0 clamp(1rem,4vw,3rem) 1rem; columns: 300px 3; column-gap: 1rem; }
.viral-mine .tweet-wrap { break-inside: avoid; margin-bottom: 1rem; }

/* SECTION DIVIDER WITH LABEL */
.viral-divider { max-width: 1200px; margin: 0 auto; padding: 2rem clamp(1rem,4vw,3rem) 1.2rem; }
.viral-divider-head { border-top: 1px solid rgba(180,160,255,0.08); padding-top: 1.5rem; }
.viral-divider-label { font-family: 'Oswald', sans-serif; font-size: 0.65rem; letter-spacing: 0.3em; text-transform: uppercase; color: var(--gold); margin-bottom: 0.3rem; }
.viral-divider-title { font-family: 'Oswald', sans-serif; font-weight: 700; font-size: 1.4rem; text-transform: uppercase; }

/* OTHERS ABOUT ME GRID */
.viral-others { max-width: 1200px; margin: 0 auto; padding: 0 clamp(1rem,4vw,3rem) 2rem; columns: 300px 3; column-gap: 1rem; }
.viral-others .tweet-wrap { break-inside: avoid; margin-bottom: 1rem; }
@media (max-width: 500px) { .viral-mine, .viral-others { columns: 1; } }

/* FACEBOOK SECTION */
.fb-section { max-width: 1200px; margin: 0 auto; padding: 0 clamp(1rem,4vw,3rem) 2rem; }
.fb-section-head { padding: 2rem 0 1.5rem; border-top: 1px solid rgba(180,160,255,0.08); }
.fb-section-label { font-family: 'Oswald', sans-serif; font-size: 0.65rem; letter-spacing: 0.3em; text-transform: uppercase; color: var(--gold); margin-bottom: 0.4rem; }
.fb-section-title { font-family: 'Oswald', sans-serif; font-weight: 700; font-size: 1.5rem; text-transform: uppercase; }
.fb-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 1.2rem; padding-bottom: 3rem; }
.fb-video-wrap { background: var(--card-bg); border: 1px solid var(--card-border); border-radius: 10px; overflow: hidden; }
.fb-video-wrap iframe { width: 100%; min-height: 400px; border: none; display: block; }
@media (max-width: 500px) { .fb-grid { grid-template-columns: 1fr; } }

/* FOOTER */
.footer { padding: 3rem clamp(1rem,4vw,3rem) 2rem; background: rgba(8,4,15,0.95); text-align: center; }
.footer-name { font-family: 'Oswald', sans-serif; font-weight: 700; font-size: 0.95rem; letter-spacing: 0.15em; text-transform: uppercase; color: rgba(255,255,255,0.15); }
.footer-sub { font-size: 0.72rem; color: rgba(255,255,255,0.1); margin-top: 0.4rem; }
</style>
</head>
<body>

<div id="nav"></div>
<script src="nav.js"></script>

<!-- HEADER -->
<header class="page-header">
  <div class="page-header-inner" style="animation: fadeUp 0.8s ease both;">
    <div class="page-label">Content</div>
    <h1 class="page-title">Social Reel</h1>
    <div class="page-rule"></div>
    <p class="page-subtitle">Finding the angle no one else sees &mdash; on air and online (Please give posts a moment to load)</p>
  </div>
</header>

<!-- TOP POSTS — explicitly placed across 3 columns -->
<div class="viral-top5">
  <div class="viral-top5-col">
    <div class="tweet-wrap" data-tweet-id="2013458117137494190"></div>
    <div class="tweet-wrap" data-tweet-id="1726124211377443132"></div>
    <div class="tweet-wrap" data-tweet-id="1762504150297039352"></div>
  </div>
  <div class="viral-top5-col">
    <div class="tweet-wrap" data-tweet-id="1870217012175331537"></div>
    <div class="tweet-wrap" data-tweet-id="1078479256970178560"></div>
  </div>
  <div class="viral-top5-col">
    <div class="tweet-wrap" data-tweet-id="1713349044557496803"></div>
    <div class="tweet-wrap" data-tweet-id="1829047298225287264"></div>
  </div>
</div>

<!-- WHAT OTHERS ARE SAYING -->
<div class="fb-section">
  <div class="fb-section-head">
    <div class="fb-section-label">From Others</div>
    <h2 class="fb-section-title">What People Are Saying</h2>
  </div>
</div>
<div class="viral-others" id="othersPosts"></div>

<!-- FOOTER -->
<footer class="footer">
  <div class="footer-name">Tony Castricone</div>
  <div class="footer-sub">Voice of the Washington Huskies &middot; Play-By-Play U &middot; &copy; 2026</div>
</footer>

<!-- Twitter/X embed script -->
<script>
// Posts from others
var othersTweetIds = [
  '1713335725242917209',
  '1728809804632924542',
  '1715139732710338618'
];

// Populate others grid
var othersGrid = document.getElementById('othersPosts');
othersTweetIds.forEach(function(id) {
  var wrap = document.createElement('div');
  wrap.className = 'tweet-wrap';
  wrap.setAttribute('data-tweet-id', id);
  othersGrid.appendChild(wrap);
});

// Load Twitter widgets.js and render all tweets
window.__twitterReady = function() {
  document.querySelectorAll('[data-tweet-id]').forEach(function(el) {
    twttr.widgets.createTweet(el.getAttribute('data-tweet-id'), el, {
      theme: 'dark',
      align: 'center',
      dnt: true
    });
  });
};

(function() {
  var s = document.createElement('script');
  s.src = 'https://platform.twitter.com/widgets.js';
  s.charset = 'utf-8';
  s.onload = function() { window.__twitterReady(); };
  document.body.appendChild(s);
})();
</script>
</body>
</html>
