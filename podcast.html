<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Long-Form Podcast — Tony Castricone</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@300;400;500;600;700&family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<link href="https://web-player.art19.com/assets/current.css" media="screen" rel="stylesheet" type="text/css">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; --purple: #b4a0ff; --purple-deep: #7c5ce0; --gold: #ffd666; --bg: #0a0514; --bg2: #0d0820; --text: #fff; --text-dim: rgba(255,255,255,0.5); --text-faint: rgba(255,255,255,0.25); --card-bg: rgba(255,255,255,0.03); --card-border: rgba(180,160,255,0.08); }
body { background: var(--bg); color: var(--text); font-family: 'Cormorant Garamond', Georgia, serif; overflow-x: hidden; -webkit-font-smoothing: antialiased; line-height: 1.6; }
::selection { background: rgba(180,160,255,0.3); }
::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: rgba(180,160,255,0.15); border-radius: 3px; }
a { color: inherit; text-decoration: none; }

@keyframes fadeUp { from { opacity:0; transform:translateY(30px); } to { opacity:1; transform:translateY(0); } }
.reveal { opacity: 0; transform: translateY(30px); transition: opacity 0.7s cubic-bezier(.4,0,.2,1), transform 0.7s cubic-bezier(.4,0,.2,1); }
.reveal.visible { opacity: 1; transform: translateY(0); }

/* VIDEO SECTION */
.video-section { max-width: 960px; margin: 0 auto; padding: 0 clamp(1rem,4vw,3rem) 4rem; }
.video-wrapper { position: relative; padding-bottom: 56.25%; background: #000; border-radius: 12px; overflow: hidden; border: 1px solid rgba(180,160,255,0.08); }
.video-wrapper iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }
.video-caption { font-family: 'Oswald', sans-serif; font-size: 0.7rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--text-faint); text-align: center; margin-top: 1rem; }

/* EPISODES SECTION */
.episodes-section { max-width: 960px; margin: 0 auto; padding: 2rem clamp(1rem,4vw,3rem) 3rem; }
.episodes-title { font-family: 'Oswald', sans-serif; font-weight: 700; font-size: 1.5rem; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 2rem; text-align: center; }
.episode-card { background: var(--card-bg); border: 1px solid var(--card-border); border-radius: 10px; padding: 1.5rem; margin-bottom: 1.5rem; }

/* DIVIDER */
.section-divider { max-width: 960px; margin: 0 auto; padding: 0 clamp(1rem,4vw,3rem); }
.section-divider-line { height: 1px; background: linear-gradient(90deg, transparent, rgba(180,160,255,0.12), transparent); }

/* CTA */
.demo-cta { max-width: 960px; margin: 0 auto; padding: 3rem clamp(1rem,4vw,3rem) 5rem; text-align: center; }
.demo-cta-text { font-family: 'Helvetica Neue', Arial, sans-serif; font-size: 0.95rem; color: var(--text-dim); margin-bottom: 1.5rem; }
.demo-cta-links { display: flex; gap: 1rem; justify-content: center; flex-wrap: wrap; }
.demo-cta-link { font-family: 'Oswald', sans-serif; font-size: 0.78rem; letter-spacing: 0.18em; text-transform: uppercase; padding: 0.8rem 2rem; border-radius: 6px; transition: all 0.3s; display: inline-block; }
.demo-cta-link.primary { background: linear-gradient(135deg, var(--purple), var(--purple-deep)); color: var(--bg); font-weight: 600; }
.demo-cta-link.primary:hover { transform: translateY(-2px); box-shadow: 0 6px 25px rgba(124,92,224,0.25); }
.demo-cta-link.secondary { border: 1px solid rgba(180,160,255,0.25); color: var(--purple); }
.demo-cta-link.secondary:hover { background: rgba(180,160,255,0.08); border-color: var(--purple); }

/* FOOTER */
.footer { padding: 3rem clamp(1rem,4vw,3rem) 2rem; background: rgba(8,4,15,0.95); text-align: center; }
.footer-name { font-family: 'Oswald', sans-serif; font-weight: 700; font-size: 0.95rem; letter-spacing: 0.15em; text-transform: uppercase; color: rgba(255,255,255,0.15); }
.footer-sub { font-size: 0.72rem; color: rgba(255,255,255,0.1); margin-top: 0.4rem; }
</style>
</head>
<body>

<div id="nav"></div>
<script src="nav.js"></script>

<!-- FEATURED VIDEO -->
<div class="video-section reveal" style="padding-top: 5.5rem;">
  <div class="video-wrapper">
    <iframe src="https://www.youtube.com/embed/9melIOa6ZBg" allowfullscreen allow="encrypted-media"></iframe>
  </div>
  <p class="video-caption">Long-Form Podcast</p>
  <p style="font-family:'Oswald',sans-serif; font-size:0.6rem; letter-spacing:0.3em; text-transform:uppercase; color:var(--text-faint); text-align:center; margin-top:1.5rem;">Scroll for More Episodes</p>
</div>

<div class="section-divider"><div class="section-divider-line"></div></div>

<!-- PODCAST EPISODES -->
<div class="episodes-section reveal">
  <h2 class="episodes-title">Episodes</h2>
  <div class="episode-card">

  </div>
  <div class="episode-card">

  </div>
  <div class="episode-card">
    <div class="art19-web-player awp-medium awp-theme-dark-blue" data-episode-id="8b3795d4-3085-43f2-9ea9-71202e5b2489"></div>

</div>

<!-- CTA -->
<div class="demo-cta reveal">
  <p class="demo-cta-text">Want to hear play-by-play calls? Check out the demo reel.</p>
  <div class="demo-cta-links">
    <a class="demo-cta-link primary" href="demo.html">Listen to Demos &rarr;</a>
  </div>
</div>

<!-- FOOTER -->
<footer class="footer">
  <div class="footer-name">Tony Castricone</div>
  <div class="footer-sub">Voice of the Washington Huskies &middot; Play-By-Play U &middot; &copy; 2026</div>
</footer>

<script src="https://web-player.art19.com/assets/current.js" type="text/javascript"></script>
<script>
// Scroll reveal
var observer = new IntersectionObserver(function(entries) {
  entries.forEach(function(e) { if (e.isIntersecting) { e.target.classList.add('visible'); observer.unobserve(e.target); } });
}, { threshold: 0.1 });
document.querySelectorAll('.reveal').forEach(function(el) { observer.observe(el); });
</script>
</body>
</html>
